<!DOCTYPE html>
<html>

<head>

    <title>VideoKYC-Auto</title>

    <style>

        body{
            font-family:Arial,sans-serif;
            text-align:center;
            background:#f4f6f8;
            margin-top:40px;
        }

        h1{
            color:#1f4e79;
        }

        video{
            width:700px;
            border:4px solid #2ecc71;
            border-radius:10px;
        }

        canvas{
            display:none;
        }

        button{

            padding:12px 25px;
            margin:10px;
            font-size:16px;
            cursor:pointer;
            border:none;
            border-radius:8px;
            background:#2ecc71;
            color:white;

        }

        button:hover{

            background:#27ae60;

        }

        #status{

            margin-top:20px;
            font-size:20px;
            color:#1f4e79;
            font-weight:bold;

        }

        #ocr{

            width:80%;
            margin:auto;
            margin-top:20px;
            padding:20px;
            background:white;
            border-radius:10px;
            text-align:left;
            display:none;

        }

        #faceSection{

            display:none;
            margin-top:30px;

        }

    </style>

</head>

<body>

<h1>Video KYC Verification</h1>

<h3 id="stepTitle">
    Step 1 : Show your ID Card to the Camera
</h3>

<video id="video" autoplay playsinline></video>

<canvas id="canvas"></canvas>

<br>

<button onclick="startCamera()">
    Start Camera
</button>

<button id="captureButton" onclick="captureImage()">
    Capture ID
</button>

<div id="faceSection">

    <h3>
        Step 2 : Face Verification
    </h3>

    <p>
        Remove the ID card and look directly at the camera.
    </p>

    <button onclick="startFaceVerification()">
        Start Face Verification
    </button>

</div>

<div id="ocr">

    <h2>OCR Result</h2>

    <p><b>Name:</b> <span id="name"></span></p>

    <p><b>Date of Birth:</b> <span id="dob"></span></p>

    <p><b>Licence:</b> <span id="licence"></span></p>

</div>

<p id="status">

Waiting to start camera...

</p>

<script>

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const status=document.getElementById("status");

async function startCamera(){

    try{

        const stream=await navigator.mediaDevices.getUserMedia({
            video:true
        });

        video.srcObject=stream;

        status.innerHTML="Camera Started. Show your ID Card.";

    }

    catch(error){

        alert(error.message);

    }

}

function captureImage(){

    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;

    const ctx=canvas.getContext("2d");

    ctx.drawImage(video,0,0);

    const image=canvas.toDataURL("image/png");

    fetch("/capture_document",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            image:image
        })

    })

    .then(response=>response.json())

    .then(data=>{

        status.innerHTML=data.message;

        document.getElementById("ocr").style.display="block";

        document.getElementById("name").innerHTML=data.name;

        document.getElementById("dob").innerHTML=data.dob;

        document.getElementById("licence").innerHTML=data.licence;

        document.getElementById("faceSection").style.display="block";

        document.getElementById("captureButton").disabled=true;

        document.getElementById("stepTitle").innerHTML=
        "Step 2 : Remove your ID Card and Look at the Camera";

    });

}

function startFaceVerification(){

    status.innerHTML = "Running Liveness Detection...";

    // Open the Flask route directly
    window.location.href = "/start_face_verification";

}

</script>

</body>

</html>
