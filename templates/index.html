<!DOCTYPE html>
<html>

<head>
    <title>VideoKYC-Auto</title>
</head>

<body>

    <h1>VideoKYC-Auto</h1>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <h3>Upload ID Card</h3>
        <input type="file" name="id_card" accept="image/*" required>

        <br><br>

        <h3>Upload Selfie</h3>
        <input type="file" name="selfie" accept="image/*" required>

        <br><br>

        <button type="submit">
            Verify Identity
        </button>

    </form>

</body>

</html>
